<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Student Dashboard | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <!-- Background Shapes -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

        <!-- ================= SIDEBAR ================= -->

        <!-- Left Side -->
        <div class="left-panel">

            <div class="logo">
                <i class="fas fa-user-graduate"></i>
                <h1>Smart Student Dashboard</h1>
            </div>

            <h2>Welcome Back!</h2>

            <p>
                Manage your academic activities efficiently.
                Track courses, assignments, attendance,
                and much more—all in one place.
            </p>

            <img src="images/student.svg" alt="" class="illustration">
        </div>

        <!-- Login Card -->
        <div class="login-card">

            <h2>Login</h2>

            <p class="subtitle">
                Sign in to continue
            </p>

            <form id="loginForm">

                <!-- Student ID -->
                <div class="input-group">

                    <label>Student ID</label>

                    <div class="input-box">

                        <i class="fas fa-id-card"></i>

                        <input
                            type="text"
                            id="studentID"
                            placeholder="Enter Student ID">

                    </div>

                    <small id="idError"></small>

                </div>

                <!-- Password -->
                <div class="input-group">

                    <label>Password</label>

                    <div class="input-box">

                        <i class="fas fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter Password">

                        <i
                            class="fas fa-eye togglePassword"
                            id="togglePassword">
                        </i>

                    </div>

                    <small id="passwordError"></small>

                </div>

                <!-- Remember -->
                <div class="options">

                    <label>

                        <input
                            type="checkbox"
                            id="remember">

                        Remember Me

                    </label>

                    <a href="#" id="forgotPassword">
                        Forgot Password?
                    </a>

                </div>

                <button
                    type="submit"
                    id="loginBtn">

                    <span id="btnText">
                        Login
                    </span>

                    <span
                        class="spinner"
                        id="spinner">
                    </span>

                </button>

            </form>

        </div>

    </div>

    <!-- Forgot Password Modal -->
    <div class="modal" id="modal">

        <div class="modal-content">

            <h2>Forgot Password</h2>

            <p>
                This feature is currently unavailable.
                Please contact your administrator.
            </p>

            <button id="closeModal">
                Close
            </button>

        </div>

    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="toast.js"></script>
    <script src="login.js"></script>

</body>
</html>
